name: Build and deploy to GitHub Pages

# Fires on every push to main (or master). Also fires when you click
# "Run workflow" in the GitHub Actions tab.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Only one deploy at a time — cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: false

# Least-privilege tokens for the deploy step.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compute base path
        id: base_path
        run: |
          # For a project site the URL is https://<owner>.github.io/<repo>/,
          # so the base path is "/<repo>". For a user/org site
          # (<name>.github.io) the site is served from the root, so base path
          # stays empty.
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          if [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
            echo "base_path=" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/$REPO_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (Next.js static export)
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.base_path.outputs.base_path }}

      - name: Add .nojekyll
        # Stops GitHub Pages' Jekyll layer from ignoring files/folders starting
        # with underscores (like `_next` and `_astro`).
        run: touch out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

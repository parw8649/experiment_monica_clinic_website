name: Build and deploy to GitHub Pages

# Fires on every push to main (or master). Also fires when you click
# "Run workflow" in the GitHub Actions tab.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Only one deploy at a time — cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: false

# Least-privilege tokens for the deploy step.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compute base path
        id: base_path
        run: |
          # The build needs to know what URL prefix the site will be served
          # from so it can rewrite absolute asset paths inside the bundled
          # CSS and JS. Decision tree (highest priority first):
          #
          #   1. If a CNAME file exists at public/CNAME (you've pointed a
          #      custom domain at GitHub Pages), the site serves from the
          #      domain root, so base path is empty.
          #
          #   2. If the repository name is exactly "<owner>.github.io"
          #      (a user or organisation site), the site serves from the
          #      domain root, so base path is empty.
          #
          #   3. Otherwise it's a project site at
          #      https://<owner>.github.io/<repo>/ and the base path is
          #      "/<repo>".
          #
          # To override this in CI (e.g. preview branches or staging), set
          # the env var BASE_PATH_OVERRIDE in the workflow run or as a
          # repository variable and we'll honour it verbatim.
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          OVERRIDE='${{ vars.BASE_PATH_OVERRIDE }}'
          if [ -n "$OVERRIDE" ]; then
            BASE_PATH="$OVERRIDE"
            echo "Using BASE_PATH_OVERRIDE repo variable: '$BASE_PATH'"
          elif [ -f "public/CNAME" ]; then
            BASE_PATH=""
            echo "Detected public/CNAME — serving from custom domain root."
          elif [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
            BASE_PATH=""
            echo "User/org site (${OWNER}.github.io) — serving from root."
          else
            BASE_PATH="/$REPO_NAME"
            echo "Project site — serving from /${REPO_NAME}/."
          fi
          echo "base_path=$BASE_PATH" >> "$GITHUB_OUTPUT"

      - name: Build (Next.js static export)
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.base_path.outputs.base_path }}

      - name: Rewrite absolute asset paths with base path
        # Next.js rewrites its own chunk URLs when basePath is set, but the
        # production CSS + JS bundles we ship under public/_astro/ contain
        # hardcoded absolute paths ("/assets/...", "/libs/...") that pass
        # through the build untouched. This step walks out/ after the build
        # and prefixes every such path with the base path so a project-site
        # deployment resolves them correctly.
        run: node scripts/rewrite-base-path.mjs
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.base_path.outputs.base_path }}

      - name: Add .nojekyll
        # Stops GitHub Pages' Jekyll layer from ignoring files/folders starting
        # with underscores (like `_next` and `_astro`).
        run: touch out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
